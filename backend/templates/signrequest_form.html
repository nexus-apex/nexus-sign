{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} SignRequest | NexusSign{% endblock %}
{% block page_title %}{% if editing %}Edit SignRequest{% else %}New SignRequest{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Document Title</label>
        <input type="text" name="document_title" value="{{ record.document_title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Signer Name</label>
        <input type="text" name="signer_name" value="{{ record.signer_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Signer Email</label>
        <input type="email" name="signer_email" value="{{ record.signer_email|default:'' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="pending" {% if record.status == 'pending' %}selected{% endif %}>Pending</option>
          <option value="signed" {% if record.status == 'signed' %}selected{% endif %}>Signed</option>
          <option value="declined" {% if record.status == 'declined' %}selected{% endif %}>Declined</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Sent Date</label>
        <input type="date" name="sent_date" value="{{ record.sent_date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Signed Date</label>
        <input type="date" name="signed_date" value="{{ record.signed_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Ip Address</label>
        <input type="text" name="ip_address" value="{{ record.ip_address|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} SignRequest</button>
      <a href="/signrequests/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
