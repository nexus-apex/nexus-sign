{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Template | NexusSign{% endblock %}
{% block page_title %}{% if editing %}Edit Template{% else %}New Template{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" name="category" value="{{ record.category|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Pages</label>
        <input type="number" name="pages" value="{{ record.pages|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Fields Count</label>
        <input type="number" name="fields_count" value="{{ record.fields_count|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Usage Count</label>
        <input type="number" name="usage_count" value="{{ record.usage_count|default:'0' }}">
      </div>
    </div>
    <div class="form-group">
      <div class="checkbox-wrapper">
        <input type="checkbox" name="active" id="id_active" {% if record.active %}checked{% endif %}>
        <label for="id_active" style="margin-bottom:0">Active</label>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Template</button>
      <a href="/templates/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
